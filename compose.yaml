services:

  postgres:
    container_name: pmg_db
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pmg-be
    environment:
      - APP_NAME=${APP_NAME}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - BACKEND_PORT=${BACKEND_PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - FRONTEND_PORT=${FRONTEND_PORT}
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: pmg-fe
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - backend

volumes:
  postgres_data: